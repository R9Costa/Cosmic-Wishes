<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MakeAWish | Written in the Stars</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #020205 url('https://www.transparenttextures.com/patterns/stardust.png'), 
                        radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            color: white; font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* REALISTIC NEBULA BACKGROUND */
        .nebula {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover; opacity: 0.4; mix-blend-mode: screen; pointer-events: none;
        }

        /* 3D MOON */
        .moon {
            position: absolute; top: 50px; right: 50px; width: 80px; height: 80px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Crescent_Moon_with_Earthshine.png/640px-Crescent_Moon_with_Earthshine.png') no-repeat center center;
            background-size: contain; filter: drop-shadow(0 0 25px rgba(255,255,255,0.3));
            z-index: 2; animation: moonFloat 6s ease-in-out infinite;
        }

        @keyframes moonFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* THE STARS (WISHES) */
        .wish-star {
            position: absolute; color: rgba(255,255,255,0.8); font-size: 0.85rem;
            text-shadow: 0 0 10px white; pointer-events: none; white-space: nowrap;
            animation: wishLife 8s ease-in-out forwards;
        }

        @keyframes wishLife {
            0% { opacity: 0; transform: scale(0.5) translateY(10px); }
            20% { opacity: 1; transform: scale(1) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: scale(0.8) translateY(-20px); }
        }

        /* SHOOTING STAR EFFECT */
        .shooting-star {
            position: absolute; height: 2px; background: linear-gradient(90deg, white, transparent);
            filter: drop-shadow(0 0 5px white); pointer-events: none; z-index: 5;
        }

        /* UI ELEMENTS */
        .interface {
            position: relative; z-index: 10; height: 100vh; display: flex;
            flex-direction: column; justify-content: space-between; align-items: center;
            padding: 40px 20px; box-sizing: border-box; text-align: center;
        }

        h1 { font-family: 'Cinzel', serif; letter-spacing: 12px; font-size: 2.2rem; margin: 0; }
        .subtitle { font-size: 0.9rem; letter-spacing: 4px; color: #aaa; text-transform: uppercase; }

        .input-box { width: 100%; max-width: 400px; margin-bottom: 20px; }

        textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px; color: white; font-family: inherit;
            resize: none; outline: none; margin-bottom: 15px; backdrop-filter: blur(10px);
        }

        .pay-btn {
            background: white; color: black; padding: 16px 40px; border-radius: 50px;
            text-decoration: none; font-weight: bold; font-size: 0.8rem; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.3s; display: inline-block;
        }

        .pay-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px white; }

        .online-now { font-size: 0.7rem; color: #666; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="nebula"></div>
    <div class="moon"></div>
    <div id="sky"></div>

    <div class="interface">
        <header>
            <h1>MAKEAWISH</h1>
            <div class="subtitle">Written in the Stars</div>
        </header>

        <div class="input-box">
            <textarea id="wish-input" rows="3" placeholder="Trust your wish to the universe..."></textarea>
            <a href="https://www.paypal.me/VIPQuickPro/2eur" class="pay-btn" onclick="makeShoot()">Send to the Heavens • 2€</a>
        </div>

        <div class="online-now">
            <span id="count">1,842</span> SOULS CONNECTED
        </div>
    </div>

    <script>
        const sky = document.getElementById('sky');
        const wishes = [
            "Eternal love.", "Health for my family.", "Success in my journey.",
            "May we all be free.", "Peace of mind.", "Gratitude.", "Recomeçar.", "Prosperidade."
        ];

        function createWishStar(text = null) {
            const star = document.createElement('div');
            star.className = 'wish-star';
            star.style.left = Math.random() * 80 + 10 + '%';
            star.style.top = Math.random() * 50 + 20 + '%';
            star.innerHTML = `✦ ${text || wishes[Math.floor(Math.random() * wishes.length)]}`;
            sky.appendChild(star);
            setTimeout(() => star.remove(), 8000);
        }

        function makeShoot() {
            const s = document.createElement('div');
            s.className = 'shooting-star';
            s.style.top = Math.random() * 30 + '%';
            s.style.left = '-100px';
            s.style.width = '150px';
            s.style.transform = 'rotate(25deg)';
            
            const anim = s.animate([
                { left: '-100px', opacity: 1 },
                { left: '120%', opacity: 0 }
            ], { duration: 1000, easing: 'ease-in' });

            sky.appendChild(s);
            anim.onfinish = () => s.remove();
        }

        // Live cycle
        setInterval(createWishStar, 4000);
        setInterval(() => {
            const c = document.getElementById('count');
            c.innerText = (parseInt(c.innerText.replace(',','')) + Math.floor(Math.random()*3-1)).toLocaleString();
        }, 3000);

        // Initial stars
        for(let i=0; i<3; i++) setTimeout(createWishStar, i * 1500);
    </script>
</body>
</html>
