<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MakeAWish | Envia o Teu Desejo</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #fff; /* Estrelas cadentes agora são brancas e puras */
        }

        /* 1. FUNDO CÓSMICO PROFUNDO E REALISTA */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Georgia', serif; /* Fonte mais elegante e 'mágica' */
            color: white;
            /* Imagem de Alta Resolução da Via Láctea Profunda */
            background: #010103 url('https://images.unsplash.com/photo-1543722530-d2c3201371e7?q=80&w=2560&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.2); z-index: 1; }

        /* 2. A LUA CRESCENTE FIXA */
        .moon {
            position: absolute; top: 10%; right: 10%; width: 100px; height: 100px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Crescent_Moon_with_Earthshine.png/640px-Crescent_Moon_with_Earthshine.png') no-repeat center center;
            background-size: contain; filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));
            z-index: 3; opacity: 0.9;
        }

        /* 3. ESTRELAS CADENTES REALISTAS */
        .shooting-star {
            position: absolute; height: 1px; border-radius: 999px;
            background: linear-gradient(-45deg, white, rgba(0,0,0,0));
            filter: drop-shadow(0 0 4px white); opacity: 0; z-index: 2;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); width: 0; opacity: 1; }
            10% { width: 100px; }
            100% { transform: translateX(1200px) translateY(1200px) rotate(-45deg); width: 0; opacity: 0; }
        }

        /* Layout Imersivo (Sem cartões) */
        .main-content {
            position: relative; z-index: 10; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; width: 100%; height: 100%;
            padding-bottom: 5vh; box-sizing: border-box;
        }

        header h1 { font-weight: 300; letter-spacing: 10px; text-transform: uppercase; font-size: 3em; margin: 0; text-shadow: 0 0 15px rgba(255,255,255,0.6); }
        header p { color: #ccc; margin-top: 5px; font-weight: 300; letter-spacing: 2px; }

        /* Lista de Desejos: Flutuante e Translúcida */
        #wish-list {
            position: absolute; top: 25%; left: 5%; width: 40%; max-height: 50vh;
            overflow: hidden; text-align: left; display: flex; flex-direction: column-reverse; gap: 8px; z-index: 5;
        }
        .wish-item {
            padding: 10px 15px; background: rgba(255,255,255,0.03); border-radius: 10px;
            border-left: 2px solid rgba(255,255,255,0.1); font-size: 0.9em;
            animation: fadeInWish 1s ease forwards, float 5s ease-in-out infinite; color: #ddd; opacity: 0;
        }
        .wish-item b { color: rgba(255,255,255,0.5); font-weight: 300; font-size: 0.8em; margin-right: 5px; }

        /* Zona de Input: Glassmorphism Puro */
        .input-zone { width: 90%; max-width: 500px; display: flex; flex-direction: column; align-items: center; margin-top: auto; }

        textarea {
            width: 100%; height: 80px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 20px;
            color: white; padding: 15px; resize: none; margin-bottom: 15px; font-size: 1em;
            box-sizing: border-box; outline: none; transition: border-color 0.3s;
        }
        textarea:focus { border-color: rgba(255,255,255,0.3); }

        .btn-pay {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: white; border: 1px solid var(--border); padding: 15px 40px; border-radius: 50px;
            font-weight: bold; cursor: pointer; transition: 0.4s; text-decoration: none;
            text-transform: uppercase; letter-spacing: 3px; font-size: 0.9em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-pay:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255,255,255,0.2); }

        @keyframes fadeInWish { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
    </style>
</head>
<body>

<div class="overlay"></div>
<div class="moon"></div>
<div id="star-layer"></div>

<div id="wish-list"></div>

<div class="main-content">
    <header>
        <h1>MakeAWish</h1>
        <p>Envia o teu desejo ao cosmos por 2.00€</p>
    </header>

    <div class="input-zone">
        <textarea id="user-wish" placeholder="Confia o teu desejo ao universo..."></textarea>
        <a href="https://www.paypal.me/VIPQuickPro/2eur" class="btn-pay" id="pay-button" target="_blank">Pedir Desejo</a>
        <p style="font-size: 0.7em; color: rgba(255,255,255,0.3); margin-top: 10px; letter-spacing: 1px;">Pagamento Seguro via PayPal</p>
    </div>
</div>

<script>
    const starLayer = document.getElementById('star-layer');
    const wishList = document.getElementById('wish-list');
    
    // Lista de desejos simulados para preencher o céu
    const fakeWishes = [
        "Paz na terra.", "Cura para quem eu amo.", "Sucesso nos meus estudos.",
        "Abundância e prosperidade.", "Amor sincero.", "Viagem de sonho realizada.",
        "Força para recomeçar.", "Gratidão pela vida."
    ];

    function shootStar(isBig = false) {
        const star = document.createElement('div');
        star.className = 'shooting-star';
        // Começa mais perto do topo para cruzar a Lua se calhar
        star.style.left = (Math.random() * 50 - 10) + '%';
        star.style.top = (Math.random() * 20) + '%';
        
        if(isBig) {
            star.style.height = '3px';
            star.style.background = 'white';
            star.style.filter = 'drop-shadow(0 0 10px white)';
        }
        
        star.style.animation = `shoot ${isBig ? 1.5 : 3}s ease-out forwards`;
        starLayer.appendChild(star);
        setTimeout(() => star.remove(), 3500);
    }

    function addWish() {
        const wish = fakeWishes[Math.floor(Math.random() * fakeWishes.length)];
        const div = document.createElement('div');
        div.className = 'wish-item';
        // Adiciona um ligeiro atraso aleatório na animação de flutuação para parecer mais natural
        div.style.animationDelay = `${Math.random() * 2}s`;
        div.innerHTML = `<b>Há instantes • Anónimo</b>${wish}`;
        wishList.prepend(div);
        
        if(wishList.children.length > 5) wishList.lastChild.remove();
        shootStar();
    }

    // Gatilho do botão: Lança estrela grande ao clicar
    document.getElementById('pay-button').addEventListener('click', () => {
        shootStar(true);
    });

    // Início rápido com desejos
    for(let i=0; i<4; i++) {
        setTimeout(addWish, i * 1200);
    }
    
    // Novas estrelas e desejos ao longo do tempo
    setInterval(addWish, 10000);
</script>

</body>
</html>
