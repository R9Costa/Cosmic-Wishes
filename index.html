<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MakeAWish | Written in the Stars</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020205;
            color: white; font-family: 'Inter', sans-serif; overflow: hidden;
        }

        .nebula {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover; opacity: 0.35; mix-blend-mode: screen; pointer-events: none; z-index: 0;
        }

        .stars-overlay {
            position: fixed; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: 1; pointer-events: none;
        }

        .interface {
            position: relative; z-index: 10; height: 100vh; display: flex;
            flex-direction: column; justify-content: space-between; align-items: center;
            padding: 40px 20px; box-sizing: border-box; text-align: center;
        }

        h1 { font-family: 'Cinzel', serif; letter-spacing: 12px; font-size: 2.2rem; margin: 0; }
        .subtitle { font-size: 0.75rem; letter-spacing: 4px; color: rgba(255,255,255,0.4); text-transform: uppercase; }

        .input-box { width: 100%; max-width: 400px; margin-bottom: 10px; }

        textarea {
            width: 100%; background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            padding: 20px; color: white; font-family: inherit; resize: none;
            outline: none; margin-bottom: 15px; backdrop-filter: blur(8px);
            box-sizing: border-box; font-size: 1rem;
        }

        .pay-btn {
            background: #ffffff; color: #000; padding: 18px 45px; border-radius: 50px;
            text-decoration: none; font-weight: bold; font-size: 0.85rem; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.3s; display: inline-block;
        }

        /* SECÇÃO DE DOAÇÃO 50% */
        .charity-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 15px;
            max-width: 320px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }
        .charity-info b { color: #ffd700; display: block; margin-bottom: 4px; letter-spacing: 1px; }

        #audio-toggle {
            position: fixed; bottom: 20px; left: 20px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px;
            border-radius: 50%; cursor: pointer; z-index: 100;
        }

        .wish-star {
            position: absolute; color: white; font-size: 0.8rem;
            text-shadow: 0 0 10px white; pointer-events: none;
            animation: wishLife 10s ease-in-out forwards;
        }
        @keyframes wishLife {
            0% { opacity: 0; transform: scale(0.5); }
            20% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
    </style>
</head>
<body>

    <div class="nebula"></div>
    <div class="stars-overlay"></div>
    <div id="sky"></div>

    <audio id="bg-audio" loop>
        <source src="https://cdn.pixabay.com/audio/2022/01/21/audio_31b3e6e66e.mp3" type="audio/mpeg">
    </audio>
    <button id="audio-toggle">🔇</button>

    <div class="interface">
        <header>
            <h1>MAKEAWISH</h1>
            <div class="subtitle">Written in the Stars</div>
        </header>

        <div class="input-box">
            <textarea id="wish-input" rows="3" placeholder="Trust your wish to the universe..."></textarea>
            <a href="https://www.paypal.com/paypalme/VIPQuickPro/2" class="pay-btn">Send to the Heavens • 2€</a>
            
            <div class="charity-info">
                <b>✦ COSMIC IMPACT ✦</b>
                50% of your contribution (1.00€) is donated to support children with Autism. 
                Your wish helps dreams come true on Earth too.
            </div>
        </div>

        <div style="font-size: 0.6rem; color: rgba(255,255,255,0.2); letter-spacing: 2px;">
            ✦ SECURE WORLDWIDE CONNECTION ✦
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');
        const audioBtn = document.getElementById('audio-toggle');
        const sky = document.getElementById('sky');

        audioBtn.onclick = () => {
            if (audio.paused) { audio.play(); audioBtn.innerText = "🔊"; }
            else { audio.pause(); audioBtn.innerText = "🔇"; }
        };

        function createWish() {
            const wishes = ["Love", "Health", "Peace", "Success", "Joy"];
            const star = document.createElement('div');
            star.className = 'wish-star';
            star.style.left = Math.random() * 80 + 10 + '%';
            star.style.top = Math.random() * 50 + 20 + '%';
            star.innerHTML = `✦ ${wishes[Math.floor(Math.random()*wishes.length)]}`;
            sky.appendChild(star);
            setTimeout(() => star.remove(), 10000);
        }
        setInterval(createWish, 6000);
        createWish();
    </script>
</body>
</html>
