<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MakeAWish | Written in the Stars</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300&display=swap');

        /* DESIGN ESPAÇO PROFUNDO */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020205; /* Fundo Negro Cósmico */
            color: white; font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* NEBULOSA ESCURA (Remove o esbranquiçado) */
        .nebula {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover; 
            opacity: 0.35; /* Opacidade baixa para manter o preto profundo */
            mix-blend-mode: screen; pointer-events: none; z-index: 0;
        }

        .stars-overlay {
            position: fixed; inset: 0;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: 1; pointer-events: none;
        }

        /* INTERFACE */
        .interface {
            position: relative; z-index: 10; height: 100vh; display: flex;
            flex-direction: column; justify-content: space-between; align-items: center;
            padding: 40px 20px; box-sizing: border-box; text-align: center;
        }

        h1 { font-family: 'Cinzel', serif; letter-spacing: 12px; font-size: 2.2rem; margin: 0; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .subtitle { font-size: 0.75rem; letter-spacing: 4px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-top: 5px; }

        .input-box { width: 100%; max-width: 400px; margin-bottom: 20px; }

        textarea {
            width: 100%; background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            padding: 20px; color: white; font-family: inherit; resize: none;
            outline: none; margin-bottom: 20px; backdrop-filter: blur(8px);
            box-sizing: border-box; font-size: 1rem; transition: 0.3s;
        }
        textarea:focus { border-color: rgba(255,255,255,0.3); }

        /* BOTÃO PAYPAL CORRIGIDO */
        .pay-btn {
            background: #ffffff; color: #000; padding: 18px 45px; border-radius: 50px;
            text-decoration: none; font-weight: bold; font-size: 0.85rem; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.3s; display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .pay-btn:hover { transform: translateY(-3px); background: #f0f0f0; }

        /* CONTROLO DE ÁUDIO */
        #audio-toggle {
            position: fixed; bottom: 20px; left: 20px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px;
            border-radius: 50%; cursor: pointer; z-index: 100; font-size: 1.2rem;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
        }

        /* ESTRELAS FLUTUANTES */
        .wish-star {
            position: absolute; color: white; font-size: 0.8rem;
            text-shadow: 0 0 10px white; pointer-events: none;
            animation: wishLife 10s ease-in-out forwards; z-index: 5;
        }
        @keyframes wishLife {
            0% { opacity: 0; transform: scale(0.5); }
            20% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
    </style>
</head>
<body>

    <div class="nebula"></div>
    <div class="stars-overlay"></div>
    <div id="sky"></div>

    <audio id="bg-audio" loop>
        <source src="https://cdn.pixabay.com/audio/2022/01/21/audio_31b3e6e66e.mp3" type="audio/mpeg">
    </audio>
    <button id="audio-toggle">🔇</button>

    <div class="interface">
        <header>
            <h1>MAKEAWISH</h1>
            <div class="subtitle">Written in the Stars</div>
        </header>

        <div class="input-box">
            <textarea id="wish-input" rows="3" placeholder="Trust your wish to the universe..."></textarea>
            <a href="https://www.paypal.com/paypalme/VIPQuickPro/2" class="pay-btn" id="send-btn">Send to the Heavens • 2€</a>
        </div>

        <div style="font-size: 0.65rem; color: rgba(255,255,255,0.2); letter-spacing: 2px; margin-bottom: 10px;">
            ✦ SECURE CONNECTION TO THE COSMOS ✦
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');
        const audioBtn = document.getElementById('audio-toggle');
        const sky = document.getElementById('sky');

        // Controlo de Som
        audioBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                audioBtn.innerText = "🔊";
                audioBtn.style.background = "rgba(255,255,255,0.15)";
            } else {
                audio.pause();
                audioBtn.innerText = "🔇";
                audioBtn.style.background = "rgba(255,255,255,0.05)";
            }
        };

        // Criar desejos a flutuar no céu
        function createWish() {
            const wishes = ["Saúde", "Amor", "Paz", "Prosperidade", "Sucesso"];
            const star = document.createElement('div');
            star.className = 'wish-star';
            star.style.left = Math.random() * 80 + 10 + '%';
            star.style.top = Math.random() * 50 + 15 + '%';
            star.innerHTML = `✦ ${wishes[Math.floor(Math.random()*wishes.length)]}`;
            sky.appendChild(star);
            setTimeout(() => star.remove(), 10000);
        }

        // Inicia alguns desejos e repete
        setInterval(createWish, 6000);
        createWish();
    </script>
</body>
</html>
